# ============================================================
# GOVERNANCE
# ============================================================
governance:
  outcome_tracking: true
  report_windows: [7, 30, 90]
  auto_disable:
    enabled: true
    min_signals: 20
    min_win_rate: 0.35
    re_enable_after_days: 7
  health_check_interval: 60
  unhealthy_threshold: 3

# ============================================================
# REGIME THRESHOLDS — Strategy chop weight overrides
# ============================================================
# These override the defaults in signals/regime_thresholds.py.
# Only add entries for strategies you want to change.
# trend = weight at chop_strength=0.0 (pure trend market)
# chop  = weight at chop_strength=1.0 (pure choppy market)
# Interpolated linearly between. Range: 0.25 to 1.35
#
# After 2-4 weeks of paper trading, check which strategies
# are winning/losing in each regime and adjust accordingly.
# Default values are documented here for reference:
#
#   SmartMoneyConcepts:    trend: 1.00  chop: 0.85
#   InstitutionalBreakout: trend: 1.00  chop: 0.45
#   MomentumContinuation:  trend: 1.00  chop: 0.40
#   ElliottWave:           trend: 1.00  chop: 0.35
#   IchimokuCloud:         trend: 1.00  chop: 0.50
#   MeanReversion:         trend: 0.75  chop: 1.30
#   ExtremeReversal:       trend: 0.80  chop: 1.20
#   PriceAction:           trend: 1.00  chop: 0.90
#   FundingRateArb:        trend: 1.00  chop: 1.10
#   RangeScalper:          trend: 0.30  chop: 1.35
#
# Example override (uncomment and adjust after data):
# regime_thresholds:
#   chop_weights:
#     ElliottWave:
#       trend: 1.00
#       chop: 0.25    # Lower if EW keeps losing in chop

# ============================================================
# CACHE
# ============================================================
cache:
  ohlcv_ttl: 60
  orderflow_ttl: 3
  derivatives_ttl: 30
  regime_ttl: 300
  rotation_ttl: 600
  sentiment_ttl: 1800
  universe_ttl: 3600

# ── Time Filters ─────────────────────────────────────────────────────────────
# Dead zone: no trading during low-liquidity hours (UTC)
# Avoid 03:00–07:00 UTC (Asian session close, EU pre-open, low volume)
time_filters:
  dead_zone_start_utc: 3      # Hour to start avoiding signals (UTC)
  dead_zone_end_utc:   7      # Hour to stop avoiding signals (UTC)
  enable_dead_zone:    true   # Set false to disable entirely

