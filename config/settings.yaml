# ============================================================
# TITANBOT PRO — MASTER CONFIGURATION
# Version: 3.0.0 | v300 — Full Overhaul (all audited bugs fixed)
# ============================================================
# THIS IS THE ONLY FILE YOU NEED TO EDIT.
# All modules read from this file via ConfigLoader singleton.
#
# v300 CHANGES (full audit fix):
#   - API keys removed from YAML — use .env (see .env.example)
#   - Duplicate PRAGMA block removed from database.py
#   - Indicator cache collision fixed (timeframe-aware keys)
#   - get_recent_signals LIMIT raised to 500
#   - EXPIRED outcome now calls portfolio close + price_cache unsub
#   - Circuit breaker is_active no longer calls create_task from property
#   - asyncio.get_event_loop() replaced with get_running_loop()
#   - Learning loop evidence counters decrement on history trim
#   - Backtester now runs all 13 strategies + full filter pipeline
#   - Dashboard: ticker selector fixed, BE filter fixed, XSS fixed
#   - Dashboard: Scan Notebook runs all 13 strategies
#   - Dashboard: auth token on mutating endpoints
#   - SSE no longer triggers full loadOv() every 5s
#   - Period selector on outcomes chart now works
#   - CORS allows all localhost ports
# ============================================================

# ============================================================
# GLOBAL SWITCHES — Start here before touching anything else
# ============================================================
global:
  debug_mode: false
  test_mode: false
  paper_trading: true
  timezone: "UTC"
  version: "3.0.0"

  # ── AI Analyst (Nemotron-3-Super via OpenRouter) ───────────
  # OpenRouter key format: sk-or-v1-xxxx
  # Get your free key from: https://openrouter.ai
  # Model used: nvidia/nemotron-3-super-120b-a12b:free ($0/token)
  openrouter_api_key: "${OPENROUTER_API_KEY}"

  # AI mode: "full" | "off" | "diagnosis_only"
  #   full            — signal AI + self-healing diagnostic
  #   diagnosis_only  — only diagnostic engine, no signal AI
  #   off             — pure rule-based mode (v19 behaviour)
  ai_mode: "full"

  # ── HyperTracker (CMM) — Smart Money Intelligence ──────────
  # Get your key from: app.coinmarketman.com/hypertracker → API
  # Free tier: 100 req/day  |  Pulse: 50,000 req/month
  # Cohort intel fetched ON DEMAND for A/A+ signals only (not on a timer).
  # Watched wallets polled every 30 minutes.
  hypertracker_api_key: ""   # No key needed — uses free Hyperliquid public API
  # Watched wallets auto-populated by scripts/fetch_hl_wallets.py
  # Run: python scripts/fetch_hl_wallets.py  to refresh from HL leaderboard
  hypertracker_watched_wallets:
    []   # populated by fetch_hl_wallets.py — run the script first

# ============================================================
# SYSTEM — Tuned for MacBook Pro 2013 / 8GB RAM / SSD
# ============================================================
system:
  async_workers: 10
  max_symbols: 200
  batch_size: 10
  tier1_interval: 120
  tier2_interval: 300
  tier3_interval: 900
  stalker_interval: 180
  regime_interval: 300
  rotation_interval: 600
  universe_refresh: 3600
  prevent_sleep: true
  reentry_cooldown_mins: 15  # V17: reduced from 30 to 15 min
  # ── Logging ─────────────────────────────────────────────────
  # log_level: verbosity of the main log and console (INFO or DEBUG).
  # To capture everything for bug-finding, change debug_mode (above) to true.
  #
  # Files produced every run:
  #   logs/titanbot.log — normal run log (INFO by default, DEBUG if debug_mode: true)
  #   logs/errors.log   — ALWAYS captures WARNING/ERROR/CRITICAL from every module,
  #                       with file name + line number. Commit this file to the repo
  #                       after a run so a developer can review all issues at once.
  #   logs/debug.log    — written ONLY when debug_mode: true; full exhaustive trace
  #                       of every decision the bot makes.
  #   logs/trades.log   — ALWAYS active; one line per signal/trigger/trail/outcome.
  #                       Commit this file to trace trading-logic errors: wrong TPs,
  #                       weak trigger arming, bad trailing stop behaviour, etc.
  #
  # Tip: set debug_mode: true (at the top of this file) for a full debug run,
  # then commit logs/errors.log, logs/trades.log, and logs/debug.log for review.
  log_level: "INFO"
  log_file: "logs/titanbot.log"
  error_log_file: "logs/errors.log"
  debug_log_file: "logs/debug.log"
  trade_log_file: "logs/trades.log"
  log_max_bytes: 10485760      # 10 MB per file before rotation
  log_backup_count: 5          # keep 5 rotated copies of each log
  pending_signal_timeout: 14400

# ============================================================
# EXCHANGE — Binance Perpetual Futures
# ============================================================
