# ============================================================
# SIGNAL AGGREGATOR
# ============================================================
aggregator:
  # First-pass geometry filter in the aggregator.
  # Intentionally LOW — the engine's get_adaptive_min_confidence() is the
  # real quality gate (direction-aware, F&G-adjusted, regime-adaptive).
  # Setting this too high kills valid signals before they reach the smart gate.
  # 62 = absolute floor (geometrically broken setups, wrong direction, etc.)
  min_confidence: 60  # Lowered from 62: AI recommends allowing borderline signals to reach the engine's smarter adaptive gate (which is 69+ in BULL_TREND)

  max_signals_per_symbol: 3        # 3/day per symbol — allows genuine re-setups across sessions
  dedup_window_minutes: 180        # Was 240 — 3hr window still prevents spam but catches real re-setups

  weights:
    technical: 0.30
    volume: 0.15
    orderflow: 0.18
    derivatives: 0.20
    sentiment: 0.07
    correlation: 0.10

  # Regime adjustments.
  #
  # CHOPPY min_confidence_override: 80 → 70
  #   The old value of 80 was HIGHER than apply_regime_filter's interpolated
  #   confidence floor at moderate chop (e.g. ~73 at chop=0.25). This meant
  #   signals that passed apply_regime_filter were silently killed here,
  #   completely defeating the chop interpolation fix from V6.
  #   70 = regime_thresholds.REGIME_THRESHOLDS["CHOPPY"]["trend_floor"]
  #   The adaptive engine gate (get_adaptive_min_confidence) scales
  #   dynamically from 70 → 82 based on actual chop_strength above this.
  #
  # VOLATILE min_confidence_override: 78 → 75
  #   Same issue — adaptive engine handles the real scaling.
  regime_adjustments:
    BULL_TREND:
      derivatives: +0.05
      technical: -0.05
    BEAR_TREND:
      orderflow: +0.05
      sentiment: +0.05
      technical: -0.10
    CHOPPY:
      min_confidence_override: 70
    VOLATILE:
      derivatives: +0.08
      min_confidence_override: 75

  adaptation:
    enabled: true
    ewma_decay: 0.1
    min_signals_before_adapt: 10
    max_weight_boost: 0.15
    max_weight_penalty: -0.15

# ============================================================
# RISK MANAGEMENT
# ============================================================
risk:
  account_size: 5000
  # account_balance is read by portfolio_engine for live capital tracking.
  # It starts equal to account_size and is updated in memory as trades close.
  # On restart it resets to this value — adjust to your current balance.
  account_balance: 5000
  base_currency: "USDT"

  risk_per_trade: 0.007            # Was 0.005 ($25/trade). Now $35/trade at $5k — still conservative
  max_risk_per_trade: 0.012        # Was 0.01 — small headroom for high-conviction A+ grades
  min_risk_per_trade: 0.003        # Was 0.002

  tier_risk:
    tier1: 0.005
    tier2: 0.003
    tier3: 0.001

  min_rr: 2.0
  min_rr_trending: 2.0
  min_rr_choppy: 1.5
  min_rr_neutral: 1.8
  target_rr: 2.5
  max_rr: 6.0

  use_kelly: true
  kelly_fraction: 0.25            # Was 0.15 (15% of Kelly). 0.25 = quarter-Kelly — still very safe
  max_position_pct: 0.05
  max_entry_delay_min: 20

  atr_period: 14
  sl_atr_mult: 1.2
  tp1_atr_mult: 1.8
  tp2_atr_mult: 2.8
  tp3_atr_mult: 4.0
  entry_zone_atr_mult: 0.20
  entry_zone_tight_mult: 0.10

  rsi_overbought: 70
  rsi_oversold: 30
  rsi_extreme_ob: 80
  rsi_extreme_os: 20
  adx_trend_threshold: 25
  adx_strong_trend: 40
  adx_no_trend: 20
  volume_spike_mult: 2.0

  use_trailing: true
  trail_activation: 1.0
  trail_distance_atr: 1.0

  max_daily_trades: 150       # 320 symbols * multiple strategies, allow plenty of room
  max_daily_loss_pct: 0.03
  max_concurrent_signals: 4       # Was 5 — matches max_correlated_positions*2 sectors realistically

  correlation_adjustment: true
  max_correlated_positions: 2

  circuit_breaker:
    max_consecutive_losses: 4     # Was 3 — too tight on cold start with no prior data; tighten after 30+ trades
    max_losses_per_hour: 3        # Was 2 — 3 losses/hr still protective without hair-trigger pauses
    cooldown_minutes: 45
    max_drawdown_pct: 0.08
    max_peak_drawdown_pct: 0.12   # T3-FIX: halt if capital drops 12% from today's intraday high
    max_absolute_day_loss_pct: 0.20  # ISSUE-8: hard kill if total day loss exceeds 20% — no cooldown, clears at midnight

# ============================================================
# DATABASE
# ============================================================
database:
