name: "Copilot Setup Steps"

# Automatically run the setup steps when they are changed to allow for easy validation, and
# allow manual testing through the repository's "Actions" tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        # The repo's tests import several third-party libraries at module-load time
        # (pandas, ccxt, aiosqlite, aiohttp, numpy). Some are mocked in
        # tests/conftest.py, but subprocess-spawned tests (e.g. test_five_area_realmath)
        # import the real modules, and async DB tests import the real `aiosqlite`.
        # Installing them up-front avoids spurious import-time failures.
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          pip install numpy pandas aiohttp aiohttp-cors aiosqlite ccxt psutil python-dotenv PyYAML python-telegram-bot openai
